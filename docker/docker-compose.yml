services:
  video-transcript-api:
    image: ghcr.io/zj1123581321/video-transcript-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: video-transcript-api
    environment:
      - TZ=Asia/Shanghai
    ports:
      # 宿主端口 8200（n305 上 portainer 已占 8000）；外部入口
      # https://sum.lexgogo.site 经 Cloudflare Tunnel 落到 :8200。
